# Exemplo documental de RBAC somente leitura. Não é aplicado automaticamente.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: openshift-aiops-readonly-example
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "pods/status", "services", "endpoints", "events", "namespaces", "nodes", "persistentvolumeclaims", "persistentvolumes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["config.openshift.io", "operator.openshift.io", "operators.coreos.com", "monitoring.coreos.com"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
# Não inclua permissão para ler conteúdo de secrets.
